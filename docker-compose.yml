services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: forum_participant_navigator
      POSTGRES_USER: fpn
      POSTGRES_PASSWORD: fpn
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fpn -d forum_participant_navigator"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:

